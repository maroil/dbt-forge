name: Commit Messages

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conventional-commits:
    name: Conventional commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Validate commit messages in pull requests
        if: github.event_name == 'pull_request'
        run: |
          uvx --from commitizen cz check \
            --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Validate commit messages on push
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git log -1 --pretty=%B "${{ github.sha }}" > .git/COMMIT_EDITMSG
            uvx --from commitizen cz check --commit-msg-file .git/COMMIT_EDITMSG
          else
            uvx --from commitizen cz check \
              --rev-range "${{ github.event.before }}..${{ github.sha }}"
          fi
